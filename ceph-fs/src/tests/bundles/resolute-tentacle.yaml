variables:
  openstack-origin: &openstack-origin distro

default-base: ubuntu@26.04

machines:
  '0':
    constraints: cores=2 mem=4G root-disk=25G virt-type=virtual-machine
  '1':
    constraints: cores=2 mem=4G root-disk=25G virt-type=virtual-machine
  '2':
    constraints: cores=2 mem=4G root-disk=25G virt-type=virtual-machine
  '3':
  '4':
  '5':
  '6':
    base: ubuntu@24.04
    constraints: cores=1 mem=2G root-disk=12G virt-type=virtual-machine
  '7':
    base: ubuntu@24.04
    constraints: cores=1 mem=2G root-disk=12G virt-type=virtual-machine

applications:
  ceph-fs:
    charm: ch:ceph-fs
    channel: tentacle/edge
    num_units: 1
    options:
      source: *openstack-origin
      pool-type: erasure-coded
      ec-profile-k: 4
      ec-profile-m: 2
    to:
      - '2'

  ceph-osd:
    charm: ch:ceph-osd
    num_units: 3
    storage:
      osd-devices: 'loop,10G'
    options:
      osd-devices: '/dev/test-non-existent'
      source: *openstack-origin
    channel: tentacle/edge
    to:
      - '0'
      - '1'
      - '2'

  ceph-mon:
    charm: ch:ceph-mon
    channel: tentacle/edge
    num_units: 3
    options:
      monitor-count: '3'
      source: *openstack-origin
    to:
      - '3'
      - '4'
      - '5'

  ubuntu:
    charm: ch:ubuntu
    num_units: 2
    channel: latest/stable
    base: ubuntu@24.04
    to:
      - '6'
      - '7'

relations:
  - - 'ceph-mon:mds'
    - 'ceph-fs:ceph-mds'

  - - 'ceph-osd:mon'
    - 'ceph-mon:osd'
