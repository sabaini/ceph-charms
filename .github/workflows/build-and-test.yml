name: Build/Test

on:
  workflow_call:
  # Nightly full run of every charm on main. The CI health dashboard
  # (canonical/ceph-qa) tracks how often tests fail on merged code, and
  # it ignores PR runs -- which are the only time this workflow normally
  # runs -- so this schedule is what feeds it.
  schedule:
    - cron: "0 2 * * *" # 02:00 UTC every night
  workflow_dispatch:
    inputs:
      part:
        description: 'Name of the charm to build/test manually. Defaults to all charms'
        required: false
        default: ''

jobs:
  modifiedparts:
    # Don't run the nightly schedule in forks. PRs and manual runs are
    # unaffected.
    if: ${{ github.event_name != 'schedule' || github.repository == 'canonical/ceph-charms' }}
    runs-on: ubuntu-latest
    outputs:
      parts: ${{ steps.determine-parts.outputs.parts }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Only needed for runs triggered by a code change (PRs). Manual
      # and nightly runs pick charms without a diff -- all charms, or
      # just the `part` input.
      - name: Get modified files
        id: changed-files
        if: ${{ github.event_name != 'workflow_dispatch' && github.event_name != 'schedule' }}
        uses: tj-actions/changed-files@823fcebdb31bb35fdf2229d9f769b400309430d0 # v46.0.3

      - name: Determine charms to build/test
        id: determine-parts
        env:
          INPUT_PART: ${{ inputs.part }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          ALL_MOD_FILES: ${{ steps.changed-files.outputs.all_modified_files }}
        run: |
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ] || [ "$GITHUB_EVENT_NAME" = "schedule" ]; then
            if [ -n "$INPUT_PART" ]; then
              # Manual run with a specified charm
              components=($INPUT_PART)
            else
              # Manual or scheduled run, no charm specified -> run all
              components=($(find . -maxdepth 1 -type d ! -path '.' -exec bash -c '[[ -f "$0/charmcraft.yaml" ]] && basename "$0"' {} \; | sort))
            fi
          else
            # Automatic run: use changed-files to determine modified charms
            echo "Modified files to eval: ${ALL_MOD_FILES}"
            components=()
            # Retrieve components with a 'tox.ini' file.
            for file in ${ALL_MOD_FILES} ; do
              component=$(echo "$file" | cut -d "/" -f1)
              if [[ -f "./$component/charmcraft.yaml" ]]; then
                # This is a charm.
                components+=("$component")
              elif [[ -f "./$component/tox.ini" ]]; then
                # Assume this is a library.
                # TODO: Add dependent charms here.
                :
              fi
            done
            # Remove dups
            components=($(echo "${components[@]}" | tr ' ' '\n' | sort -u))
          fi
          json_output=$(jq --compact-output --null-input '$ARGS.positional' --args -- "${components[@]}")
          echo "Modified parts: $json_output"
          echo "parts=$json_output" >> $GITHUB_OUTPUT

  build:
    needs: modifiedparts
    name: Build the charm
    runs-on: ubuntu-latest
    if: ${{ needs.modifiedparts.outputs.parts != '[]' }}
    strategy:
      matrix:
        part: ${{ fromJson(needs.modifiedparts.outputs.parts) }}
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get -qq install libxslt-dev libxml2-dev python3-lxml tox

      - name: Run linters
        run: tox -c ${{ matrix.part }} -e pep8

      - name: Run unit tests
        run: tox -c ${{ matrix.part }} -e py3

      - name: Setup LXD
        uses: canonical/setup-lxd@v0.1.1
        with:
          channel: 5.21/stable

      - name: Build charm(s)
        id: builder
        run: |
          sudo snap install charmcraft --classic
          tox -c ${{ matrix.part }} -e build

      - name: Upload built charm
        uses: actions/upload-artifact@v4
        with:
          name: charm-artifact-${{ matrix.part }}
          path: "./${{ matrix.part }}/*.charm"

  functional-test:
    needs:
      - modifiedparts
      - build
    name: Functional tests
    runs-on: [self-hosted, linux, amd64, X64, large, noble]
    # A job that `needs: build` is normally skipped if ANY build failed.
    # Nightly/manual runs build all nine charms, and one failed build
    # shouldn't stop the other eight from being tested. So, run when:
    # - the run wasn't cancelled, and
    # - the charm list was computed and isn't empty, and
    # - either all builds passed (still required for PRs), or this is a
    #   nightly/manual run (test what did build; a charm whose build
    #   failed simply fails here at the artifact download).
    if: >-
      ${{ !cancelled() && needs.modifiedparts.result == 'success' &&
      needs.modifiedparts.outputs.parts != '[]' &&
      (needs.build.result == 'success' ||
      github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') }}
    strategy:
      matrix:
        part: ${{ fromJson(needs.modifiedparts.outputs.parts) }}
      fail-fast: false
    steps:
      - name: Download charm
        uses: actions/download-artifact@v4
        with:
          name: charm-artifact-${{ matrix.part }}
          pattern: charm-artifact-*
          merge-multiple: true
          path: ~/artifacts/

      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Copy utils
        run: cp tests/scripts/actionutils.sh $HOME

      - name: Clear FORWARD firewall rules
        run: ~/actionutils.sh cleaript

      - name: Setup LXD
        run: |
          if [[ "$(snap list | grep -c lxd)" -eq 0 ]]; then
            sudo snap install lxd --channel=5.21/stable
            sudo usermod -aG lxd "$USER"
            newgrp lxd
            lxd init --minimal
          fi

      - name: Install and configure tests
        run: |
          date
          ~/actionutils.sh setup_functest
          ~/actionutils.sh cacheimgs "ubuntu@26.04"

      - name: Run the tests
        run: |
          date
          mv ~/artifacts/*.charm ./
          if [[ -f "./${{ matrix.part }}/src/tox.ini" ]]; then
            tox -c ${{ matrix.part }}/src -e func-dev
          else
            tox -c ${{ matrix.part }} -e func-dev
          fi

      - name: Generate crash dumps
        if: ${{ failure() || cancelled() }}
        run: |
          models=$(juju models | grep zaza | awk '{print $1}' | tr -d '*')
          rm -rf ./crashdumps
          mkdir ./crashdumps
          for model in $models; do
            juju-crashdump -m $model -o ./crashdumps
          done

      - name: Upload artifacts on failure
        uses: actions/upload-artifact@v4
        with:
          name: crashdumps-${{ matrix.part }}
          path: "./crashdumps/*"
        if: failure()

      - name: Setup tmate session
        if: ${{ (failure() || cancelled()) && runner.debug }}
        uses: canonical/action-tmate@main

      - name: Tear down models
        if: always()
        run: |
          models=$(juju models | grep zaza | awk '{print $1}' | tr -d '*')
          for model in $models; do
            juju destroy-model --no-prompt --force --destroy-storage $model
          done

  cos-integration-test:
    needs:
      - modifiedparts
      - build
    name: COS integration (${{ matrix.agent }})
    runs-on: [self-hosted, linux, amd64, X64, large, noble]
    timeout-minutes: 120
    # Same rule as functional-test, but only when ceph-mon is in the list
    if: >-
      ${{ !cancelled() && needs.modifiedparts.result == 'success' &&
      contains(needs.modifiedparts.outputs.parts, 'ceph-mon') &&
      (needs.build.result == 'success' ||
      github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - agent: grafana-agent
            agent_deploy: "juju deploy grafana-agent --base ubuntu@24.04"
            agent_integrate: "juju integrate grafana-agent ceph-mon && juju integrate grafana-agent:juju-info ceph-mon:juju-info"
            agent_wait: "juju wait-for application grafana-agent --query='forEach(units, unit => unit.workload-status==\"active\" && unit.agent-status==\"idle\")' --timeout=20m"
            artifact_suffix: cos
            # Agents forward logs under their own juju_application label;
            # loki_log_filter ensures the content is actually from ceph.
            loki_application: grafana-agent
            loki_log_filter: ceph
          - agent: opentelemetry-collector
            agent_deploy: "juju deploy opentelemetry-collector --channel 2/stable"
            agent_integrate: "juju integrate opentelemetry-collector ceph-mon:cos-agent && juju integrate opentelemetry-collector ceph-mon:juju-info"
            agent_wait: "juju wait-for application opentelemetry-collector --query='forEach(units, unit => unit.workload-status==\"active\" && unit.agent-status==\"idle\")' --timeout=20m"
            artifact_suffix: otel
            loki_application: opentelemetry-collector
            loki_log_filter: ceph
    steps:
      - name: Download charm
        uses: actions/download-artifact@v4
        with:
          name: charm-artifact-ceph-mon
          pattern: charm-artifact-*
          merge-multiple: true
          path: ~/artifacts/

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup LXD
        uses: canonical/setup-lxd@v0.1.1
        with:
          channel: 5.21/stable

      - name: Install Juju
        run: sudo snap install juju --channel 3.6/stable

      - name: Install dependencies
        run: sudo apt-get -qq install jq

      - name: Cleanup Docker
        run: bash ./ceph-mon/tests/workflow_assets/ci_helpers.sh cleanup_docker

      - name: Setup LXD VM
        run: bash ./ceph-mon/tests/workflow_assets/k8s/01-setup-lxd-vm.sh

      - name: Deploy k8s
        run: bash ./ceph-mon/tests/workflow_assets/k8s/02-deploy-k8s.sh

      - name: Add Juju cloud and bootstrap controller
        timeout-minutes: 10
        run: bash ./ceph-mon/tests/workflow_assets/k8s/03-juju-add-cloud.sh

      - name: Deploy COS Lite
        timeout-minutes: 30
        run: bash ./ceph-mon/tests/workflow_assets/k8s/04-deploy-cos-lite.sh

      - name: Bootstrap localhost controller
        run: |
          set -eux
          juju bootstrap localhost lxd

      - name: Deploy Ceph cluster over LXD
        run: |
          set -eux
          mv ~/artifacts/ceph-mon.charm ./ceph-mon.charm
          juju add-model ceph-cos-test
          juju deploy ./ceph-mon/tests/workflow_assets/ceph-cos.yaml
          juju wait-for application ceph-mon --query='forEach(units, unit => unit.workload-status=="active" && unit.agent-status=="idle")' --timeout=20m
          juju wait-for application ceph-osd --query='forEach(units, unit => unit.workload-status=="active" && unit.agent-status=="idle")' --timeout=20m
          juju status

      - name: Integrate Ceph with COS via ${{ matrix.agent }}
        run: |
          set -eux
          # Switch to cos-lite model and offer endpoints
          juju switch ck8s-cloud:cos-lite
          juju offer prometheus:receive-remote-write
          juju offer loki:logging
          juju offer grafana:grafana-dashboard

          # Switch to ceph model on the LXD controller
          juju switch lxd:ceph-cos-test

          # Deploy the COS agent and integrate with Ceph
          ${{ matrix.agent_deploy }}
          ${{ matrix.agent_integrate }}

          # Consume cross-controller offers from the k8s controller
          juju consume ck8s-cloud:admin/cos-lite.prometheus
          juju consume ck8s-cloud:admin/cos-lite.loki
          juju consume ck8s-cloud:admin/cos-lite.grafana

          # Integrate agent with consumed offers
          juju integrate ${{ matrix.agent }} prometheus
          juju integrate ${{ matrix.agent }} loki
          juju integrate ${{ matrix.agent }} grafana

          juju wait-for application ceph-mon --query='forEach(units, unit => unit.workload-status=="active" && unit.agent-status=="idle")' --timeout=20m

          # Wait for agent to be fully initialized
          ${{ matrix.agent_wait }}

      - name: Verify Prometheus metrics, Grafana dashboards and Loki logs
        run: bash ./ceph-mon/tests/workflow_assets/k8s/05-verify-cos.sh
        env:
          COS_MODEL: ck8s-cloud:cos-lite
          EXPECTED_DASHBOARDS_FILE: ./ceph-mon/tests/workflow_assets/expected_dashboard.txt
          LOKI_APPLICATION: ${{ matrix.loki_application }}
          LOKI_LOG_FILTER: ${{ matrix.loki_log_filter }}

      - name: Verify OTel regression (no ${1} env var bug)
        if: matrix.agent == 'opentelemetry-collector'
        run: |
          set -eux
          juju switch lxd:ceph-cos-test
          if juju exec --unit opentelemetry-collector/0 -- \
               journalctl -u snap.opentelemetry-collector.opentelemetry-collector.service \
               | grep -q 'environment variable "1"'; then
            echo "FAIL: opentelemetry-collector hit the \${1} replacement bug"
            exit 1
          fi
          echo "PASS: opentelemetry-collector is running without env-var errors"

      - name: Show Juju status
        if: always()
        run: |
          set -eux
          juju status -m lxd:ceph-cos-test || true
          juju status -m ck8s-cloud:cos-lite || true
          echo "==> k8s pods in cos-lite namespace:"
          lxc exec k8s-node -- k8s kubectl get pods -n cos-lite -o wide || true

      - name: Collect logs
        if: failure()
        run: |
          set -x
          mkdir -p logs

          echo "==> COS Lite Juju status"
          juju status -m ck8s-cloud:cos-lite -o logs/cos-lite-status.yaml || true
          cat logs/cos-lite-status.yaml || true

          echo "==> COS Lite Juju debug-log (last 100 lines)"
          juju debug-log -m ck8s-cloud:cos-lite --replay --tail 100 --no-tail > logs/cos-lite-debug-log.txt 2>&1 || true

          echo "==> k8s pod status in cos-lite namespace"
          lxc exec k8s-node -- k8s kubectl get pods -n cos-lite -o wide > logs/k8s-pods.txt 2>&1 || true
          cat logs/k8s-pods.txt || true

          echo "==> k8s events in cos-lite namespace"
          lxc exec k8s-node -- k8s kubectl get events -n cos-lite --sort-by='.lastTimestamp' > logs/k8s-events.txt 2>&1 || true
          tail -30 logs/k8s-events.txt || true

          echo "==> k8s node resource allocation"
          lxc exec k8s-node -- k8s kubectl describe nodes > logs/k8s-nodes.txt 2>&1 || true
          grep -A 15 "Allocated resources" logs/k8s-nodes.txt || true

      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cos-integration-logs-${{ matrix.artifact_suffix }}
          path: logs
          retention-days: 30

      - name: Setup tmate session
        if: ${{ (failure() || cancelled()) && runner.debug }}
        uses: canonical/action-tmate@main
