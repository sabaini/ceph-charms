options:
  source: &source distro

machines:
  '0':
    constraints: cores=2 mem=6G root-disk=40G virt-type=virtual-machine
  '1':
    constraints: cores=2 mem=6G root-disk=40G virt-type=virtual-machine
  '2':
    constraints: cores=2 mem=6G root-disk=40G virt-type=virtual-machine
  '3':
  '4':
  '5':
  '6':
  '7':

local_overlay_enabled: False
default-base: ubuntu@26.04
applications:
  ceph-nfs:
    charm: ch:ceph-nfs
    channel: tentacle/edge
    num_units: 2
    options:
      source: *source
    to:
      - '6'
      - '7'
  ceph-osd:
    charm: ch:ceph-osd
    channel: tentacle/edge
    num_units: 3
    storage:
      osd-devices: 'loop,10G'
    options:
      source: *source
    to:
      - '0'
      - '1'
      - '2'
  ceph-mon:
    charm: ch:ceph-mon
    channel: tentacle/edge
    num_units: 3
    options:
      monitor-count: '3'
      source: *source
    to:
      - '3'
      - '4'
      - '5'
  ceph-fs:
    charm: ch:ceph-fs
    channel: tentacle/edge
    num_units: 1
    options:
      source: *source
    to:
      - '2'
relations:
  - - 'ceph-mon:client'
    - 'ceph-nfs:ceph-client'
  - - 'ceph-osd:mon'
    - 'ceph-mon:osd'
  - - 'ceph-fs'
    - 'ceph-mon'
