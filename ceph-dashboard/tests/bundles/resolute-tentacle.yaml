local_overlay_enabled: False
default-base: ubuntu@26.04
variables:
  openstack-origin: &openstack-origin distro
  source: &source distro

machines:
  '0':
    constraints: cores=2 mem=6G root-disk=40G virt-type=virtual-machine
  '1':
    constraints: cores=2 mem=6G root-disk=40G virt-type=virtual-machine
  '2':
    constraints: cores=2 mem=6G root-disk=40G virt-type=virtual-machine

applications:
  ceph-osd:
    charm: ch:ceph-osd
    num_units: 3
    storage:
      osd-devices: 'loop,10G'
    options:
      source: *openstack-origin
      osd-devices: '/dev/test-non-existent'
    channel: tentacle/edge
    to:
      - '0'
      - '1'
      - '2'
  ceph-mon:
    charm: ch:ceph-mon
    num_units: 3
    options:
      source: *openstack-origin
      monitor-count: '3'
    channel: tentacle/edge
  vault:
    num_units: 1
    charm: ch:vault
    channel: latest/edge
    base: ubuntu@24.04
  ceph-dashboard:
    charm: ch:ceph-dashboard
    channel: tentacle/edge
    options:
      public-hostname: 'ceph-dashboard.zaza.local'
  prometheus:
    charm: ch:prometheus2
    num_units: 1
    base: ubuntu@22.04
  mysql:
    charm: ch:mysql
    num_units: 1
    base: ubuntu@22.04
    channel: 8.0/stable
relations:
  - - 'ceph-osd:mon'
    - 'ceph-mon:osd'
  - - 'vault:shared-db'
    - 'mysql:shared-db'
  - - 'ceph-dashboard:dashboard'
    - 'ceph-mon:dashboard'
  - - 'ceph-dashboard:certificates'
    - 'vault:certificates'
  - - 'ceph-mon:prometheus'
    - 'prometheus:target'
  - - 'ceph-dashboard:prometheus'
    - 'prometheus:website'
