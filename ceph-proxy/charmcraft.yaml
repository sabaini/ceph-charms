type: charm

parts:
  charm:
    after: [git-info]
    plugin: dump
    source: .
    prime:
      - actions/*
      - charmhelpers/*
      - files/*
      - hooks/*
      - lib/*
      - templates/*
      - actions.yaml
      - config.yaml
      - copyright
      - hardening.yaml
      - icon.svg
      - LICENSE
      - Makefile
      - metadata.yaml
      - README.md

  git-info:
    plugin: nil
    build-packages: [git]
    override-build: |
      craftctl default
      if git -C $CRAFT_PROJECT_DIR rev-parse --git-dir > /dev/null 2>&1; then
        echo "commit: $(git -C $CRAFT_PROJECT_DIR rev-parse HEAD)" > $CRAFT_PART_INSTALL/git-info.txt
        echo "branch: $(git -C $CRAFT_PROJECT_DIR symbolic-ref -q --short HEAD || echo DETACHED)" >> $CRAFT_PART_INSTALL/git-info.txt
        echo "commit_date: $(git -C $CRAFT_PROJECT_DIR show -s --format=%cI HEAD)" >> $CRAFT_PART_INSTALL/git-info.txt
      fi

platforms:
  ubuntu-26.04-amd64:
    build-on: [ubuntu@26.04:amd64]
    build-for: [ubuntu@26.04:amd64]
  ubuntu-26.04-arm64:
    build-on: [ubuntu@26.04:arm64]
    build-for: [ubuntu@26.04:arm64]
  ubuntu-26.04-ppc64el:
    build-on: [ubuntu@26.04:ppc64el]
    build-for: [ubuntu@26.04:ppc64el]
  ubuntu-26.04-s390x:
    build-on: [ubuntu@26.04:s390x]
    build-for: [ubuntu@26.04:s390x]
  ubuntu-24.04-amd64:
    build-on: [ubuntu@24.04:amd64]
    build-for: [ubuntu@24.04:amd64]
  ubuntu-24.04-arm64:
    build-on: [ubuntu@24.04:arm64]
    build-for: [ubuntu@24.04:arm64]
  ubuntu-24.04-ppc64el:
    build-on: [ubuntu@24.04:ppc64el]
    build-for: [ubuntu@24.04:ppc64el]
  ubuntu-24.04-s390x:
    build-on: [ubuntu@24.04:s390x]
    build-for: [ubuntu@24.04:s390x]
