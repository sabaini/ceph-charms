default-base: ubuntu@26.04

machines:
  '0':
    constraints: cores=2 mem=4G root-disk=25G virt-type=virtual-machine
  '1':
    constraints: cores=2 mem=4G root-disk=25G virt-type=virtual-machine
  '2':
    constraints: cores=2 mem=4G root-disk=25G virt-type=virtual-machine
  '3':
  '4':
  '5':
  '6':
  '7':
    base: ubuntu@24.04

applications:
  ceph-osd:
    charm: ch:ceph-osd
    num_units: 3
    storage:
      osd-devices: 'loop,4G'
    options:
      source: distro
    to:
      - '0'
      - '1'
      - '2'
    channel: tentacle/edge

  ceph-mon:
    charm: ch:ceph-mon
    num_units: 3
    options:
      expected-osd-count: 3
      source: distro
    channel: tentacle/edge
    to:
      - '3'
      - '4'
      - '5'

  ceph-proxy:
    charm: ch:ceph-proxy
    channel: tentacle/edge
    num_units: 1
    options:
      source: distro
    to:
      - '6'

  ceph-radosgw:
    charm: ch:ceph-radosgw
    num_units: 1
    channel: tentacle/edge
    options:
      source: distro

  ceph-fs:
    charm: ch:ceph-fs
    channel: tentacle/edge
    num_units: 1
    options:
      source: distro
    to:
      - '2'

  johnny:
    charm: ch:johnny
    channel: latest/edge
    base: ubuntu@24.04
    num_units: 1
    to:
      - '7'

relations:
  - - 'ceph-osd:mon'
    - 'ceph-mon:osd'

  - - 'ceph-proxy:radosgw'
    - 'ceph-radosgw:mon'

  - - 'ceph-proxy:mds'
    - 'ceph-fs:ceph-mds'

  - - 'ceph-proxy:client'
    - 'johnny:ceph'
